spring:
  threads:
    virtual:
      enabled: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

server:
  port: ${SERVER_PORT:${PORT:8080}}
  tomcat:
    max-http-form-post-size: 12MB

app:
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    text-model: ${OPENROUTER_TEXT_MODEL:${OPENROUTER_MODEL:openai/gpt-5.4-mini}}
    vision-model: ${OPENROUTER_VISION_MODEL:${OPENROUTER_MODEL:openai/gpt-5.4-mini}}
  http-referer: ${APP_HTTP_REFERER:http://localhost:4200}
  title: ${APP_TITLE:Hardware Service Copilot}
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:4200}
